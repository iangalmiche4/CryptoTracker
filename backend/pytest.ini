[pytest]
# Configuration pytest pour CryptoTracker

# Ajouter le répertoire backend au PYTHONPATH
pythonpath = .

# Répertoires de tests
testpaths = tests

# Pattern de découverte des fichiers de tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options par défaut
addopts =
    # Verbosité
    -v
    # Afficher les print statements
    -s
    # Afficher le résumé des tests
    --tb=short
    # Afficher la couverture de code
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    # Exclure les répertoires de la couverture
    --cov-config=.coveragerc
    # Couleurs dans le terminal
    --color=yes
    # Afficher les warnings
    -W default
    # Mode strict pour les markers
    --strict-markers

# Markers personnalisés
markers =
    unit: Tests unitaires (isolation complète)
    integration: Tests d'intégration (avec dépendances)
    slow: Tests lents (> 1 seconde)
    asyncio: Tests asynchrones

# Configuration asyncio
asyncio_mode = auto

# Timeout par défaut (en secondes)
timeout = 300

# Ignorer les warnings spécifiques
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

;
